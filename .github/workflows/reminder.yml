name: Gym Tracker Reminder

on:
  schedule:
    # Pagi 07:00 WIB = 22:00 UTC (hari sebelumnya)
    - cron: '0 22 * * *'
    # Malam 20:00 WIB = 11:00 UTC
    - cron: '0 11 * * *'
  workflow_dispatch:  # bisa dijalankan manual

jobs:
  send-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Tentukan waktu & kirim reminder
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 gym_reminder.py pagi
